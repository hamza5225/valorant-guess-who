<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant Guess Who</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 {
  margin-top: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 520px;
  margin: 20px auto;
}

.card {
  background: #1e293b;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card.hidden {
  opacity: 0.2;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.fallback {
  height: 90px;
  display: none;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #334155, #1e293b);
  border-radius: 8px;
  font-weight: bold;
  font-size: 18px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #22c55e;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎮 Valorant Guess Who</h1>
<p>Tap agents to eliminate them. Each of you pick a secret agent!</p>

<div id="secret"></div>
<button onclick="pickSecret()">Pick Random Agent</button>

<div class="grid" id="grid"></div>

<script>

// FULL LIST
const agents = [
  "Astra","Breach","Brimstone","Chamber","Clove","Cypher","Deadlock","Fade","Gekko","Harbor","Iso",
  "Jett","KAY/O","Killjoy","Miks","Neon","Omen","Phoenix","Raze","Reyna","Sage","Skye","Sova",
  "Tejo","Veto","Viper","Vyse","Waylay","Yoru"
];

// RANDOM PICK
let secretAgent = "";

function pickSecret() {
  secretAgent = agents[Math.floor(Math.random() * agents.length)];
  document.getElementById("secret").innerText = "Your agent: " + secretAgent;
}

// CREATE GRID
function createGrid() {
  const grid = document.getElementById("grid");

  agents.forEach(agent => {
    const div = document.createElement("div");
    div.className = "card";

    const key = agent.toLowerCase().replace("/", "");

    div.innerHTML = `
      <img src="${key}.png" alt="${agent}"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="fallback">${agent}</div>
      <p>${agent}</p>
    `;

    div.onclick = () => div.classList.toggle("hidden");
    grid.appendChild(div);
  });
}

createGrid();

</script>

</body>
</html>
