<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant Guess Who</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 {
  margin-top: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 520px;
  margin: 20px auto;
}

.card {
  background: #1e293b;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card.hidden {
  opacity: 0.2;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.fallback {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #334155, #1e293b);
  border-radius: 8px;
  font-weight: bold;
  font-size: 18px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #22c55e;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎮 Valorant Guess Who</h1>
<p>Tap agents to eliminate them. Each of you pick a secret agent!</p>

<div id="secret"></div>
<button onclick="pickSecret()">Pick Random Agent</button>

<div class="grid" id="grid"></div>

<script>

// FULL LIST (yours)
const agents = [
  "Astra","Breach","Brimstone","Chamber","Clove","Cypher","Deadlock","Fade","Gekko","Harbor","Iso",
  "Jett","KAY/O","Killjoy","Miks","Neon","Omen","Phoenix","Raze","Reyna","Sage","Skye","Sova",
  "Tejo","Veto","Viper","Vyse","Waylay","Yoru"
];

// OFFICIAL IMAGE MAP
const imageMap = {
  astra: "https://media.valorant-api.com/agents/41fb69c1-4189-7b37-f117-bcaf1e96f1bf/displayicon.png",
  breach: "https://media.valorant-api.com/agents/5f8d3a7f-467b-97f3-062c-13acf203c006/displayicon.png",
  brimstone: "https://media.valorant-api.com/agents/9f0d8ba9-4140-b941-57d3-a7ad57c6b417/displayicon.png",
  chamber: "https://media.valorant-api.com/agents/22697a3d-45bf-8dd7-4fec-84a9e28c69d7/displayicon.png",
  clove: "https://media.valorant-api.com/agents/1f5d4c58-4fbe-7c74-1cbd-4d7f4e6bde47/displayicon.png",
  cypher: "https://media.valorant-api.com/agents/117ed9e3-49f3-6512-3ccf-0cada7e3823b/displayicon.png",
  deadlock: "https://media.valorant-api.com/agents/cc8b64c8-4b25-4ff9-6e7f-37b4da43d235/displayicon.png",
  fade: "https://media.valorant-api.com/agents/dade69b4-4f5a-8528-247b-219e5a1facd6/displayicon.png",
  gekko: "https://media.valorant-api.com/agents/e370fa57-4757-3604-3648-499e1f642d3f/displayicon.png",
  harbor: "https://media.valorant-api.com/agents/95b78ed7-4637-86d9-7e41-71ba8c293152/displayicon.png",
  iso: "https://media.valorant-api.com/agents/0f2739f5-47b5-4b64-cc41-77b3a99cbe89/displayicon.png",
  jett: "https://media.valorant-api.com/agents/add6443a-41bd-e414-f6ad-e58d267f4e95/displayicon.png",
  kayo: "https://media.valorant-api.com/agents/601dbbe7-43ce-be57-2a40-4abd24953621/displayicon.png",
  killjoy: "https://media.valorant-api.com/agents/1dbf2edd-4729-0984-3115-daa5eed44993/displayicon.png",
  neon: "https://media.valorant-api.com/agents/bb2a4828-46eb-8cd1-e765-15848195d751/displayicon.png",
  omen: "https://media.valorant-api.com/agents/8e253930-4c05-31dd-1b6c-968525494517/displayicon.png",
  phoenix: "https://media.valorant-api.com/agents/eb93336a-449b-9c1b-0a54-a891f7921d69/displayicon.png",
  raze: "https://media.valorant-api.com/agents/f94c3b30-42be-e959-889c-5aa313dba261/displayicon.png",
  reyna: "https://media.valorant-api.com/agents/a3bfb853-43b2-7238-a4f1-ad90e9e46bcc/displayicon.png",
  sage: "https://media.valorant-api.com/agents/569fdd95-4d10-43ab-ca70-79becc718b46/displayicon.png",
  skye: "https://media.valorant-api.com/agents/6f2a04ca-43e0-be17-7f36-b3908627744d/displayicon.png",
  sova: "https://media.valorant-api.com/agents/320b2a48-4d9b-a075-30f1-1f93a9b638fa/displayicon.png",
  viper: "https://media.valorant-api.com/agents/707eab51-4836-f488-046a-cda6bf494859/displayicon.png",
  yoru: "https://media.valorant-api.com/agents/7f0d8c0c-4a9e-4b49-b06d-5c6c7c0c8f3b/displayicon.png"
};

// RANDOM PICK
let secretAgent = "";

function pickSecret() {
  secretAgent = agents[Math.floor(Math.random() * agents.length)];
  document.getElementById("secret").innerText = "Your agent: " + secretAgent;
}

// CREATE GRID
function createGrid() {
  const grid = document.getElementById("grid");

  agents.forEach(agent => {
    const div = document.createElement("div");
    div.className = "card";

    const key = agent.toLowerCase().replace("/", "");

    if (imageMap[key]) {
      div.innerHTML = `
        <img src="${imageMap[key]}" alt="${agent}">
        <p>${agent}</p>
      `;
    } else {
      // CUSTOM AGENTS ALWAYS GET A NICE TILE (NO BROKEN IMAGES)
      div.innerHTML = `
        <div class="fallback">${agent}</div>
        <p>${agent}</p>
      `;
    }

    div.onclick = () => div.classList.toggle("hidden");
    grid.appendChild(div);
  });
}

createGrid();

</script>

</body>
</html>
